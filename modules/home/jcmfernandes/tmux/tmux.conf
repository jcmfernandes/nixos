# Tmux settings

# Change prefix key
set -g prefix C-Space
bind-key C-Space send-prefix
unbind-key C-b

# emacs-style status keys
set -gw mode-keys emacs

# Fix emacs multi-term resize issues
setw -g aggressive-resize on

# Enable mouse mode
set-option -g mouse on

# Set colors
set-option -g default-terminal "tmux-256color"

# Set reload key to r (home-manager renders the config under ~/.config)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded!"

# Count sessions start at 1
set -g base-index 1
set -g renumber-windows on

# Set the title bar
set -g set-titles on
set -g set-titles-string '#(whoami) :: #h'

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# create new window in current directory
bind c new-window -c "#{pane_current_path}"

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Set status bar
set -g status-style bg=black,fg=white
set -g status-interval 5
set -g status-left-length 90
set -g status-right-length 60
set -g status-left "#[fg=Green]#(whoami)#[fg=white]::#[fg=blue]#(hostname -s)"
set -g status-justify left
set -g status-right '#[fg=Cyan]#S #[fg=white]%a %d %b %R'

# performance
set -g escape-time 10

# config tmux-yank (the plugin itself comes from home-manager's
# programs.tmux.plugins, not TPM)
set -g @yank_selection_mouse 'clipboard'
